[build]
  publish = "."
  functions = "netlify/functions"

# API proxy — HARUS di atas SPA fallback
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — semua path lain ke index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
