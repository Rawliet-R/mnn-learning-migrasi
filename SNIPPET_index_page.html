<!-- ✅ TAMBAHKAN tepat sebelum </main> atau setelah section page terakhir -->

<section class="page" id="page-ai-sensei" role="main" aria-label="AI Sensei Beta">

    <!-- HEADER -->
    <header class="ais-header">
        <div class="ais-header-left">
            <div class="ais-avatar" aria-hidden="true">🤖</div>
            <div class="ais-header-info">
                <span class="ais-header-title">AI Sensei</span>
                <span class="ais-header-badge">Beta</span>
                <div id="ais-credit-remaining" class="ais-credit-label">memuat...</div>
            </div>
        </div>

        <div class="ais-credit-wrap" aria-label="Sisa kredit AI">
            <div class="ais-credit-track">
                <div class="ais-credit-bar-fill" id="ais-credit-bar" style="width:100%"></div>
            </div>
        </div>

        <button id="ais-new-chat-btn" aria-label="Mulai chat baru">+ Baru</button>
    </header>

    <!-- QUICK QUESTIONS -->
    <div class="ais-quick-wrap" role="list" aria-label="Pertanyaan cepat">
        <button class="ais-quick-btn" role="listitem"
            data-q="Apa perbedaan は (wa) dan が (ga)?">は vs が</button>
        <button class="ais-quick-btn" role="listitem"
            data-q="Bagaimana cara membentuk kalimat て-form?">て-form</button>
        <button class="ais-quick-btn" role="listitem"
            data-q="Apa perbedaan に (ni) dan で (de) dalam kalimat tempat?">に vs で</button>
        <button class="ais-quick-btn" role="listitem"
            data-q="Jelaskan pola kalimat 〜たいです beserta contohnya.">〜たいです</button>
        <button class="ais-quick-btn" role="listitem"
            data-q="Bagaimana cara menghitung benda dalam bahasa Jepang (counter)?">Counter</button>
    </div>

    <!-- CHAT MESSAGES -->
    <div id="ais-messages" role="log" aria-live="polite" aria-label="Percakapan AI Sensei">
        <!-- Diisi oleh AI_SENSEI.init() -->
    </div>

    <!-- INPUT AREA -->
    <div class="ais-input-wrap">
        <textarea
            id="ais-input"
            placeholder="Tanya tentang bahasa Jepang..."
            rows="1"
            aria-label="Tulis pertanyaan kamu"
            autocomplete="off"
            spellcheck="false"
        ></textarea>
        <button id="ais-send-btn" aria-label="Kirim pertanyaan">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>

</section>
